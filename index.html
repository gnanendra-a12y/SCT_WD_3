<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Quiz App</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#4f46e5,#06b6d4);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:700px;
background:#fff;
padding:30px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,.3);
}

h1{
text-align:center;
color:#4f46e5;
margin-bottom:20px;
}

#progress{
font-size:18px;
font-weight:bold;
margin-bottom:15px;
color:#444;
}

#question{
font-size:24px;
font-weight:bold;
margin-bottom:20px;
color:#222;
}

.option{
display:block;
width:100%;
padding:15px;
margin:10px 0;
font-size:18px;
border:none;
border-radius:10px;
background:#eef2ff;
cursor:pointer;
transition:.3s;
}

.option:hover{
background:#c7d2fe;
transform:scale(1.02);
}

.correct{
background:#22c55e!important;
color:#fff;
}

.wrong{
background:#ef4444!important;
color:#fff;
}

#nextBtn{
display:none;
margin-top:20px;
padding:12px 25px;
border:none;
background:#4f46e5;
color:#fff;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

#nextBtn:hover{
background:#3730a3;
}

#result{
display:none;
text-align:center;
}

#score{
font-size:28px;
margin:20px 0;
}

#restartBtn{
padding:12px 30px;
border:none;
background:#16a34a;
color:white;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

#restartBtn:hover{
background:#15803d;
}
</style>
</head>

<body>

<div class="container">

<h1>Computer Quiz</h1>

<div id="quiz">

<div id="progress"></div>

<div id="question"></div>

<div id="options"></div>

<button id="nextBtn">Next Question</button>

</div>

<div id="result">

<h2>Quiz Completed 🎉</h2>

<div id="score"></div>

<button id="restartBtn">Restart Quiz</button>

</div>

</div>

<script>

const questions = [

{
question:"What is the capital of India?",
options:["Delhi","Mumbai","Chennai","Kolkata"],
answer:"Delhi"
},

{
question:"How many days are there in a week?",
options:["5","6","7","8"],
answer:"7"
},

{
question:"Which planet do we live on?",
options:["Mars","Earth","Venus","Jupiter"],
answer:"Earth"
},

{
question:"What is 5 + 3?",
options:["6","7","8","9"],
answer:"8"
},

{
question:"Which animal is called the King of the Jungle?",
options:["Tiger","Lion","Elephant","Bear"],
answer:"Lion"
},

{
question:"Which color is the sky on a clear day?",
options:["Green","Blue","Red","Yellow"],
answer:"Blue"
},

{
question:"How many months are there in a year?",
options:["10","11","12","13"],
answer:"12"
},

{
question:"Which is the largest ocean?",
options:["Indian Ocean","Atlantic Ocean","Pacific Ocean","Arctic Ocean"],
answer:"Pacific Ocean"
},

{
question:"What is the national bird of India?",
options:["Peacock","Parrot","Crow","Pigeon"],
answer:"Peacock"
},

{
question:"Which is the fastest land animal?",
options:["Horse","Tiger","Cheetah","Lion"],
answer:"Cheetah"
},

{
question:"What is the currency of India?",
options:["Dollar","Rupee","Yen","Euro"],
answer:"Rupee"
},

{
question:"How many hours are there in a day?",
options:["12","18","24","30"],
answer:"24"
},

{
question:"Which fruit is yellow?",
options:["Apple","Banana","Orange","Grapes"],
answer:"Banana"
},

{
question:"Which is the largest planet in our solar system?",
options:["Earth","Mars","Jupiter","Venus"],
answer:"Jupiter"
},

{
question:"Which season is the coldest?",
options:["Summer","Winter","Rainy","Spring"],
answer:"Winter"
}

];

let current=0;
let score=0;

const question=document.getElementById("question");
const options=document.getElementById("options");
const nextBtn=document.getElementById("nextBtn");
const progress=document.getElementById("progress");

function loadQuestion(){

nextBtn.style.display="none";

options.innerHTML="";

let q=questions[current];

progress.innerHTML=`Question ${current+1} of ${questions.length}`;

question.innerHTML=q.question;

q.options.forEach(opt=>{

let btn=document.createElement("button");

btn.innerHTML=opt;

btn.className="option";

btn.onclick=()=>checkAnswer(btn,q.answer);

options.appendChild(btn);

});

}

function checkAnswer(btn,answer){

let buttons=document.querySelectorAll(".option");

buttons.forEach(b=>{

if(b.innerHTML===answer){

b.classList.add("correct");

}

if(b===btn && b.innerHTML!==answer){

b.classList.add("wrong");

}

b.disabled=true;

});

if(btn.innerHTML===answer){

score++;

}

nextBtn.style.display="inline-block";

}

nextBtn.onclick=function(){

current++;

if(current<questions.length){

loadQuestion();

}else{

document.getElementById("quiz").style.display="none";

document.getElementById("result").style.display="block";

document.getElementById("score").innerHTML=
`Your Score: ${score}/${questions.length}<br>
Percentage: ${(score/questions.length*100).toFixed(0)}%`;

}

};

document.getElementById("restartBtn").onclick=function(){

current=0;

score=0;

document.getElementById("result").style.display="none";

document.getElementById("quiz").style.display="block";

loadQuestion();

};

loadQuestion();

</script>

</body>
</html>
